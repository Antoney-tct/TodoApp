<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
 <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <title>🌙 dreamflow · tasks</title>
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="profile">
        <div class="avatar" id="profileAvatar" title="Change photo">👤</div>
        <div class="user-info">
          <h3 id="profileName" title="Edit profile">Alex Rivera</h3>
          <p id="profileBio" class="user-bio"></p>
          <p id="profileStats">✨ 0 tasks completed</p>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon" id="progressIcon" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
        </div>
        <div class="stat-content">
          <h4>Today's progress</h4>
          <div class="stat-number" id="todayProgress">0%</div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon" id="focusIcon" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24"><line x1="10" y1="2" x2="14" y2="2"></line><line x1="12" y1="14" x2="12" y2="18"></line><circle cx="12" cy="8" r="6"></circle><path d="M5 8a7 7 0 1 0 14 0"></path></svg>
        </div>
        <div class="stat-content">
          <h4>Focus time</h4>
          <div class="stat-number" id="focusTime">0m</div>
        </div>
      </div>

      <div class="categories">
        <h4>Categories</h4>
        <div class="category-item active" data-category="all">
          <div class="category-left">
            <span class="category-dot" style="background: #b592e0;"></span>
            <span class="category-name">All tasks</span>
          </div>
          <span class="category-count" id="totalCount">0</span>
        </div>
        <div class="category-item" data-category="work">
          <div class="category-left">
            <span class="category-dot" style="background: #ff8a8a;"></span>
            <span class="category-name">Work</span>
          </div>
          <span class="category-count" id="workCount">0</span>
        </div>
        <div class="category-item" data-category="personal">
          <div class="category-left">
            <span class="category-dot" style="background: #a3d9a5;"></span>
            <span class="category-name">Personal</span>
          </div>
          <span class="category-count" id="personalCount">0</span>
        </div>
        <div class="category-item" data-category="shopping">
          <div class="category-left">
            <span class="category-dot" style="background: #ffd966;"></span>
            <span class="category-name">Shopping</span>
          </div>
          <span class="category-count" id="shoppingCount">0</span>
        </div>
        <div class="category-item" data-category="health">
          <div class="category-left">
            <span class="category-dot" style="background: #c49ae0;"></span>
            <span class="category-name">Health</span>
          </div>
          <span class="category-count" id="healthCount">0</span>
        </div>
      </div>
    </div>

    <!-- Main content -->
    <div class="main">
      <div class="main-header">
        <div class="date-display" id="currentDate"></div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <svg class="icon icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m4.93 17.66 1.41-1.41"></path><path d="m17.66 4.93 1.41-1.41"></path></svg>
          <svg class="icon icon-moon" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
        </button>
      </div>

      <!-- Add task -->
      <div class="add-task">
        <input type="text" id="taskInput" placeholder="What needs to be done?">
        <select id="taskCategory">
          <option value="work">💼 Work</option>
          <option value="personal">🧘 Personal</option>
          <option value="shopping">🛒 Shopping</option>
          <option value="health">💪 Health</option>
        </select>
        <select id="taskPriority">
          <option value="low">🟢 Low</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="high">🔴 High</option>
        </select>
        <input type="number" id="taskDuration" placeholder="Mins" min="1" style="max-width: 80px;">
        <input type="date" id="taskDueDate">
        <button class="add-btn" id="addTaskBtn">Add</button>
      </div>

      <!-- Search -->
      <div class="search-box">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="searchInput" placeholder="Search tasks...">
      </div>

      <!-- Task list -->
      <ul class="task-list" id="taskList">
        <!-- Tasks will be rendered here -->
      </ul>

      <!-- Focus mode -->
      <div class="focus-mode">
        <span>
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
          Focus mode: <span id="focusStatus">inactive</span>
        </span>
        <button class="focus-btn" id="focusModeBtn">Start</button>
      </div>

      <!-- Bottom bar -->
      <div class="bottom-bar">
        <div class="task-stats">
          <span id="pendingTasks">0 pending</span> · <span id="completedTasks">0 completed</span>
        </div>
        <button class="clear-btn" id="clearCompletedBtn">Clear completed</button>
      </div>
    </div>
  </div>

  <!-- Voice input button -->
  <button class="voice-btn" id="voiceBtn" aria-label="Voice input">
    <svg class="icon" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
  </button>

  <!-- Alarm Sound -->
  <audio id="alarmSound" src="sound/notesound.mp3" preload="auto"></audio>
<script src="myjs.js"></script>

<!-- Profile Edit Modal -->
<div class="modal-overlay" id="profileModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Edit Profile</h3>
      <button class="close-modal" id="closeProfileModal">×</button>
    </div>
    <div class="modal-body">
      <div class="avatar-upload-container">
        <div class="avatar large" id="modalAvatarPreview">👤</div>
        <button class="upload-btn" id="triggerAvatarInput">Change Photo</button>
        <input type="file" id="modalAvatarInput" hidden accept="image/*">
      </div>
      
      <div class="input-group">
        <label for="editName">Name</label>
        <input type="text" id="editName" placeholder="Enter your name">
      </div>

      <div class="input-group">
        <label for="editBio">Personal Mantra</label>
        <input type="text" id="editBio" placeholder="e.g. One step at a time...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="save-btn" id="saveProfileBtn">Save Changes</button>
    </div>
  </div>
</div>

</body>
</html>
